<div id="noResults" class="text-center py-8 hidden">
    <div class="text-4xl mb-2">🔍</div>
    <p class="text-base-content/70">No hay elementos que coincidan con el filtro actual.</p>
    <button onclick="clearAllFilters()" class="btn btn-sm btn-outline mt-2">Limpiar filtros</button>
</div>

<script>
// === State ===
var activeTagFilters = [];
var allAvailableTags = [];
var highlightedIndex = -1;

// === Collect unique tags from hidden source ===
function collectTags() {
    var source = document.getElementById('allTagsSource');
    if (!source) return;
    var seen = new Set();
    var spans = source.querySelectorAll('[data-tag]');
    spans.forEach(function(s) {
        var name = s.dataset.tag.trim();
        var key = name.toLowerCase();
        if (name && !seen.has(key)) {
            seen.add(key);
            allAvailableTags.push(name);
        }
    });
    allAvailableTags.sort(function(a, b) {
        return a.toLowerCase().localeCompare(b.toLowerCase());
    });
}

// === Autocomplete UI ===
function getFilteredOptions(query) {
    var q = query.toLowerCase();
    return allAvailableTags.filter(function(tag) {
        // Exclude already selected
        if (activeTagFilters.indexOf(tag) >= 0) return false;
        // Match query
        return q === '' || tag.toLowerCase().includes(q);
    });
}

function renderDropdown() {
    var input = document.getElementById('tagAutocompleteInput');
    var dropdown = document.getElementById('tagDropdown');
    var query = input.value.trim();
    var options = getFilteredOptions(query);

    if (options.length === 0) {
        if (query) {
            dropdown.innerHTML = '<div class="p-3 text-sm text-base-content/50 text-center">No se encontraron tags</div>';
        } else {
            dropdown.innerHTML = '<div class="p-3 text-sm text-base-content/50 text-center">No hay mas tags disponibles</div>';
        }
        dropdown.classList.add('open');
        highlightedIndex = -1;
        return;
    }

    highlightedIndex = -1;
    dropdown.innerHTML = options.map(function(tag, i) {
        return '<div class="px-3 py-2 text-sm cursor-pointer hover:bg-primary/10 transition-colors" data-tag="' + tag.replace(/"/g, '&quot;') + '" data-index="' + i + '">' + escapeHtml(tag) + '</div>';
    }).join('');
    dropdown.classList.add('open');

    // Click handlers
    dropdown.querySelectorAll('[data-tag]').forEach(function(el) {
        el.addEventListener('mousedown', function(e) {
            e.preventDefault(); // Prevent input blur
            addTag(el.dataset.tag);
        });
    });
}

function closeDropdown() {
    var dropdown = document.getElementById('tagDropdown');
    dropdown.classList.remove('open');
    dropdown.innerHTML = '';
    highlightedIndex = -1;
}

function renderChips() {
    var container = document.getElementById('tagChipsContainer');
    if (!container) return;

    container.innerHTML = activeTagFilters.map(function(tag) {
        return '<span class="badge badge-primary gap-1 text-xs">' +
            escapeHtml(tag) +
            '<button class="btn btn-ghost btn-xs btn-circle p-0 min-h-0 h-4 w-4 text-primary-content" data-tag="' + tag.replace(/"/g, '&quot;') + '" type="button">&times;</button>' +
            '</span>';
    }).join('');

    // Chip remove handlers
    container.querySelectorAll('.tag-chip-remove').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            removeTag(btn.dataset.tag);
        });
    });

    // Update placeholder
    var input = document.getElementById('tagAutocompleteInput');
    if (input) {
        input.placeholder = activeTagFilters.length > 0 ? '' : 'Filtrar por tags...';
    }
}

function addTag(tagName) {
    if (activeTagFilters.indexOf(tagName) >= 0) return;
    activeTagFilters.push(tagName);
    renderChips();
    filterLibraryItems();
    // Clear input and close dropdown
    var input = document.getElementById('tagAutocompleteInput');
    input.value = '';
    closeDropdown();
    input.focus();
}

function removeTag(tagName) {
    var idx = activeTagFilters.indexOf(tagName);
    if (idx >= 0) activeTagFilters.splice(idx, 1);
    renderChips();
    filterLibraryItems();
}

function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// === Keyboard navigation ===
function handleAutocompleteKeydown(e) {
    var dropdown = document.getElementById('tagDropdown');
    var input = document.getElementById('tagAutocompleteInput');
    var items = dropdown.querySelectorAll('[data-tag]');

    if (!dropdown.classList.contains('open') || items.length === 0) {
        // Backspace on empty input removes last chip
        if (e.key === 'Backspace' && input.value === '' && activeTagFilters.length > 0) {
            removeTag(activeTagFilters[activeTagFilters.length - 1]);
        }
        return;
    }

    if (e.key === 'ArrowDown') {
        e.preventDefault();
        highlightedIndex = Math.min(highlightedIndex + 1, items.length - 1);
        updateHighlight(items);
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        highlightedIndex = Math.max(highlightedIndex - 1, 0);
        updateHighlight(items);
    } else if (e.key === 'Enter') {
        e.preventDefault();
        if (highlightedIndex >= 0 && highlightedIndex < items.length) {
            addTag(items[highlightedIndex].dataset.tag);
        }
    } else if (e.key === 'Escape') {
        closeDropdown();
    } else if (e.key === 'Backspace' && input.value === '' && activeTagFilters.length > 0) {
        removeTag(activeTagFilters[activeTagFilters.length - 1]);
    }
}

function updateHighlight(items) {
    items.forEach(function(el, i) {
        el.classList.toggle('bg-primary/10', i === highlightedIndex);
    });
    // Scroll into view
    if (highlightedIndex >= 0 && items[highlightedIndex]) {
        items[highlightedIndex].scrollIntoView({ block: 'nearest' });
    }
}

// === Filter logic ===
function filterLibraryItems() {
    var input = document.getElementById('searchInput');
    var searchTerm = input ? input.value.toLowerCase() : '';
    var items = document.querySelectorAll('.js-library-filter-item');
    var visibleCount = 0;

    items.forEach(function(item) {
        var title = item.dataset.title || '';
        var type = item.dataset.type || '';
        var relatedScore = item.dataset.relatedScore || '';
        var composer = item.dataset.composer || '';
        var categories = item.dataset.categories || '';
        var tags = item.dataset.tags || '';
        var pdfs = item.dataset.pdfs || '';
        var audios = item.dataset.audios || '';
        var documentTags = item.dataset.documentTags || '';

        var matchesSearch =
            searchTerm === '' ||
            title.includes(searchTerm) ||
            type.includes(searchTerm) ||
            relatedScore.includes(searchTerm) ||
            composer.includes(searchTerm) ||
            categories.includes(searchTerm) ||
            tags.includes(searchTerm) ||
            pdfs.includes(searchTerm) ||
            audios.includes(searchTerm) ||
            documentTags.includes(searchTerm);

        // AND logic: item must have ALL active tags
        var allTags = (tags + ' ' + documentTags).toLowerCase();
        var matchesTags = true;
        for (var i = 0; i < activeTagFilters.length; i++) {
            if (!allTags.includes(activeTagFilters[i].toLowerCase())) {
                matchesTags = false;
                break;
            }
        }

        if (matchesSearch && matchesTags) {
            item.style.display = '';
            visibleCount++;
        } else {
            item.style.display = 'none';
        }
    });

    var noResults = document.getElementById('noResults');
    if (noResults) {
        noResults.classList.toggle('hidden', visibleCount > 0);
    }

    updateStudyButton(visibleCount);

    if (typeof libraryFilterActive !== 'undefined') {
        libraryFilterActive = (searchTerm !== '' || activeTagFilters.length > 0);
    }
}

function clearTagFilter() {
    activeTagFilters = [];
    renderChips();
    filterLibraryItems();
}

function clearAllFilters() {
    var input = document.getElementById('searchInput');
    if (input) input.value = '';
    var tagInput = document.getElementById('tagAutocompleteInput');
    if (tagInput) tagInput.value = '';
    clearTagFilter();
}

function updateStudyButton(visibleCount) {
    var btn = document.getElementById('studyButton');
    var countEl = document.getElementById('studyCount');
    if (!btn) return;

    if (visibleCount > 0) {
        btn.style.display = '';
        if (countEl) countEl.textContent = visibleCount;
    } else {
        btn.style.display = 'none';
    }
}

function startStudySession() {
    var items = document.querySelectorAll('.js-library-filter-item');
    var pks = [];
    items.forEach(function(item) {
        if (item.style.display !== 'none') {
            var id = item.id.replace('library-item-', '');
            if (id) pks.push(id);
        }
    });

    if (pks.length === 0) return;

    var showAllLink = document.querySelector('a[href="?show_all=1"]');
    if (showAllLink) {
        var tagParams = activeTagFilters.length > 0 ? '&study_tags=' + encodeURIComponent(activeTagFilters.join(',')) : '';
        var searchParam = document.getElementById('searchInput').value ? '&study_search=' + encodeURIComponent(document.getElementById('searchInput').value) : '';
        window.location.href = '?show_all=1&auto_study=1' + tagParams + searchParam;
        return;
    }

    window.location.href = '{% url "my_library:study_session" %}?items=' + pks.join(',');
}

// === Init ===
document.addEventListener('DOMContentLoaded', function() {
    collectTags();

    var input = document.getElementById('tagAutocompleteInput');

    input.addEventListener('input', function() {
        renderDropdown();
    });

    input.addEventListener('focus', function() {
        renderDropdown();
    });

    input.addEventListener('blur', function() {
        // Small delay to allow click on dropdown items
        setTimeout(closeDropdown, 150);
    });

    input.addEventListener('keydown', handleAutocompleteKeydown);

    // Close dropdown when clicking outside
    document.addEventListener('click', function(e) {
        if (!e.target.closest('#tagAutocompleteWrapper')) {
            closeDropdown();
        }
    });

    // Auto-study after show_all redirect
    var params = new URLSearchParams(window.location.search);
    if (params.get('auto_study') === '1') {
        var studyTags = params.get('study_tags');
        if (studyTags) {
            activeTagFilters = studyTags.split(',');
            renderChips();
        }
        var studySearch = params.get('study_search');
        if (studySearch) {
            var searchInput = document.getElementById('searchInput');
            if (searchInput) searchInput.value = studySearch;
        }
        filterLibraryItems();
        setTimeout(function() { startStudySession(); }, 100);
    }

    // Initial filter
    filterLibraryItems();
});
</script>
