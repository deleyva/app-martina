<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modo Estudio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            color: #fff;
        }

        /* Content area — full viewport */
        #study-content {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
        }

        /* ── Floating Action Button ── */
        #study-fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 10000;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(139, 92, 246, 0.85);
            backdrop-filter: blur(10px);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s, background 0.2s;
        }
        #study-fab:hover {
            transform: scale(1.1);
            background: rgba(139, 92, 246, 1);
        }
        #study-fab.active {
            background: rgba(255, 255, 255, 0.15);
        }

        /* ── Flyout Panel ── */
        #study-flyout {
            position: fixed;
            bottom: 84px;
            right: 24px;
            z-index: 10001;
            width: 300px;
            max-height: calc(100vh - 120px);
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 0;
            opacity: 0;
            transform: translateY(12px) scale(0.95);
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
        }
        #study-flyout.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .flyout-header {
            padding: 16px 16px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .flyout-title {
            font-size: 14px;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-bottom: 4px;
        }
        .flyout-counter {
            font-size: 12px;
            opacity: 0.5;
        }

        .flyout-actions {
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .flyout-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s;
            width: 100%;
            text-align: left;
        }
        .flyout-btn:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        .flyout-btn svg {
            flex-shrink: 0;
            opacity: 0.7;
        }
        .flyout-btn.accent {
            color: #a78bfa;
        }
        .flyout-btn.danger {
            color: #f87171;
        }

        .flyout-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            margin: 4px 8px;
        }

        /* Audio section inside flyout */
        .flyout-audio {
            padding: 8px 12px 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }
        .flyout-audio-label {
            font-size: 11px;
            opacity: 0.4;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .flyout-audio-controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .flyout-audio-select {
            flex: 1;
            height: 32px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 12px;
            padding: 0 8px;
        }
        .flyout-audio-play {
            height: 32px;
            width: 32px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Flyout backdrop for outside clicks */
        #flyout-backdrop {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: none;
        }
        #flyout-backdrop.active {
            display: block;
        }

        /* Proficiency overlay */
        #proficiency-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 20000;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(10px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #proficiency-overlay.active {
            display: flex;
        }

        .proficiency-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 32px 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .proficiency-card h2 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .proficiency-card .item-title {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 24px;
        }

        .proficiency-levels {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }

        .proficiency-level-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            text-align: left;
            transition: all 0.2s;
        }

        .proficiency-level-btn:hover, .proficiency-level-btn.selected {
            border-color: rgba(168, 85, 247, 0.6);
            background: rgba(168, 85, 247, 0.2);
        }

        .proficiency-level-btn .level-stars {
            flex-shrink: 0;
        }

        .proficiency-level-btn:active {
            transform: scale(0.97);
        }

        /* Session complete overlay */
        #session-complete {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 20000;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #session-complete.active {
            display: flex;
        }

        .session-summary {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 32px 24px;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        .session-summary h2 {
            font-size: 22px;
            margin-bottom: 16px;
        }

        .session-stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 20px;
        }

        .session-stat {
            text-align: center;
        }

        .session-stat .stat-value {
            font-size: 28px;
            font-weight: 700;
        }

        .session-stat .stat-label {
            font-size: 12px;
            opacity: 0.6;
        }

        .session-items-list {
            text-align: left;
            margin-bottom: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .session-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 13px;
        }

        .session-item-row .item-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            margin-right: 8px;
        }

        .back-to-library-btn {
            display: inline-block;
            padding: 14px 32px;
            border-radius: 12px;
            border: none;
            background: #8b5cf6;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Backdrop for closing flyout on outside click -->
    <div id="flyout-backdrop" onclick="toggleFlyout(false)"></div>

    <!-- Floating Action Button -->
    <button id="study-fab" onclick="toggleFlyout()" title="Menu (M)">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.75a.75.75 0 110-1.5.75.75 0 010 1.5zM12 12.75a.75.75 0 110-1.5.75.75 0 010 1.5zM12 18.75a.75.75 0 110-1.5.75.75 0 010 1.5z"></path>
        </svg>
    </button>

    <!-- Flyout Panel -->
    <div id="study-flyout">
        <div class="flyout-header">
            <div class="flyout-title" id="flyout-title">Cargando...</div>
            <div class="flyout-counter" id="flyout-counter">-/-</div>
        </div>
        <div class="flyout-actions">
            <button class="flyout-btn accent" onclick="showProficiencyOverlay(); toggleFlyout(false);">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
                Valorar
            </button>
            <button class="flyout-btn" id="flyout-prev-btn" onclick="navigateItem(-1)">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                Anterior
            </button>
            <button class="flyout-btn" id="flyout-next-btn" onclick="navigateItem(1)">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
                Siguiente
            </button>
            <div class="flyout-divider"></div>
            <a class="flyout-btn danger" href="{% url 'my_library:index' %}?show_all=1">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
                Salir
            </a>
        </div>
        <!-- Audio controls placeholder — populated dynamically -->
        <div id="flyout-audio-section"></div>
    </div>

    <!-- Content area (lazy-loaded via fetch) -->
    <div id="study-content"></div>

    <!-- Proficiency overlay -->
    <div id="proficiency-overlay">
        <div class="proficiency-card">
            <h2>¿Como te sale?</h2>
            <div class="item-title" id="proficiency-item-title"></div>
            <div class="proficiency-levels">
                <button class="proficiency-level-btn" data-level="0" onclick="selectProficiency(0)">
                    <span class="level-stars">☆☆☆☆</span>
                    <span>No me sale</span>
                </button>
                <button class="proficiency-level-btn" data-level="1" onclick="selectProficiency(1)">
                    <span class="level-stars">⭐☆☆☆</span>
                    <span>Apenas lo conozco</span>
                </button>
                <button class="proficiency-level-btn" data-level="2" onclick="selectProficiency(2)">
                    <span class="level-stars">⭐⭐☆☆</span>
                    <span>Lo estoy aprendiendo</span>
                </button>
                <button class="proficiency-level-btn" data-level="3" onclick="selectProficiency(3)">
                    <span class="level-stars">⭐⭐⭐☆</span>
                    <span>Lo conozco bien</span>
                </button>
                <button class="proficiency-level-btn" data-level="4" onclick="selectProficiency(4)">
                    <span class="level-stars">⭐⭐⭐⭐</span>
                    <span>Me lo se muy bien</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Session complete overlay -->
    <div id="session-complete">
        <div class="session-summary">
            <div style="font-size: 48px; margin-bottom: 12px;">🎉</div>
            <h2>Sesion completada</h2>
            <div class="session-stats">
                <div class="session-stat">
                    <div class="stat-value" id="summary-total">0</div>
                    <div class="stat-label">Items estudiados</div>
                </div>
                <div class="session-stat">
                    <div class="stat-value" id="summary-avg">0</div>
                    <div class="stat-label">Media proficiency</div>
                </div>
            </div>
            <div class="session-items-list" id="summary-items"></div>
            <a href="{% url 'my_library:index' %}?show_all=1" class="back-to-library-btn">Volver a biblioteca</a>
        </div>
    </div>

    <script>
    var playlist = {{ playlist_json|safe }};
    var currentIndex = 0;
    var ratings = [];
    var selectedLevel = null;
    var csrfToken = '{{ csrf_token }}';
    var flyoutOpen = false;

    // ── Flyout ──
    function toggleFlyout(forceState) {
        flyoutOpen = (forceState !== undefined) ? forceState : !flyoutOpen;
        document.getElementById('study-flyout').classList.toggle('open', flyoutOpen);
        document.getElementById('study-fab').classList.toggle('active', flyoutOpen);
        document.getElementById('flyout-backdrop').classList.toggle('active', flyoutOpen);
    }

    function updateFlyout() {
        var item = playlist[currentIndex];
        if (!item) return;
        document.getElementById('flyout-title').textContent = item.title;
        document.getElementById('flyout-counter').textContent = (currentIndex + 1) + '/' + playlist.length;
        // Disable prev/next at boundaries
        var prevBtn = document.getElementById('flyout-prev-btn');
        var nextBtn = document.getElementById('flyout-next-btn');
        if (prevBtn) prevBtn.style.opacity = currentIndex === 0 ? '0.3' : '1';
        if (nextBtn) nextBtn.style.opacity = currentIndex >= playlist.length - 1 ? '0.3' : '1';
    }

    function navigateItem(delta) {
        var newIndex = currentIndex + delta;
        if (newIndex < 0 || newIndex >= playlist.length) return;
        toggleFlyout(false);
        loadItem(newIndex);
    }

    // ── Core study flow ──
    function loadItem(index) {
        if (index >= playlist.length) {
            showSessionComplete();
            return;
        }
        currentIndex = index;
        updateFlyout();
        var pk = playlist[index].pk;
        var container = document.getElementById('study-content');
        container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;"><div style="font-size:14px;opacity:0.5;">Cargando...</div></div>';

        fetch('{% url "my_library:study_item_content" pk=99999 %}'.replace('99999', pk), {
            credentials: 'same-origin'
        })
        .then(function(r) { return r.text(); })
        .then(function(html) {
            container.innerHTML = html;
            // Re-execute scripts in the loaded content
            var scripts = container.querySelectorAll('script');
            scripts.forEach(function(oldScript) {
                var newScript = document.createElement('script');
                if (oldScript.src) {
                    newScript.src = oldScript.src;
                } else {
                    newScript.textContent = oldScript.textContent;
                }
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });
            // Move media panel into flyout if present
            moveMediaToFlyout();
        })
        .catch(function(err) {
            container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#ff6b6b;">Error al cargar el item</div>';
        });
    }

    function moveMediaToFlyout() {
        var mediaPanel = document.getElementById('study-media-panel');
        var flyoutAudio = document.getElementById('flyout-audio-section');
        if (mediaPanel && flyoutAudio) {
            // Extract audio controls from the bottom panel and put them in flyout
            var audioSelect = mediaPanel.querySelector('#study-audio-select');
            var playBtn = mediaPanel.querySelector('#study-audio-play');
            if (audioSelect || playBtn) {
                var html = '<div class="flyout-audio"><div class="flyout-audio-label">Audio</div><div class="flyout-audio-controls">';
                if (audioSelect) {
                    html += '<select class="flyout-audio-select" id="flyout-audio-select">' + audioSelect.innerHTML + '</select>';
                }
                html += '<button class="flyout-audio-play" id="flyout-audio-play" type="button">';
                html += '<svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
                html += '</button></div></div>';
                flyoutAudio.innerHTML = html;
                // Wire up audio
                initFlyoutAudio();
            }
            // Hide the original bottom panel
            mediaPanel.style.display = 'none';
        } else {
            if (flyoutAudio) flyoutAudio.innerHTML = '';
        }
    }

    var flyoutCurrentAudio = null;
    function initFlyoutAudio() {
        var sel = document.getElementById('flyout-audio-select');
        var btn = document.getElementById('flyout-audio-play');
        if (!sel && !btn) return;

        function loadAudio(url) {
            if (flyoutCurrentAudio) { flyoutCurrentAudio.pause(); flyoutCurrentAudio = null; }
            if (!url) return;
            flyoutCurrentAudio = new Audio(url);
        }

        if (sel) {
            loadAudio(sel.value);
            sel.addEventListener('change', function() { loadAudio(this.value); });
        }

        if (btn) {
            btn.addEventListener('click', function() {
                if (!flyoutCurrentAudio) return;
                if (flyoutCurrentAudio.paused) {
                    flyoutCurrentAudio.play();
                    btn.innerHTML = '<svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>';
                } else {
                    flyoutCurrentAudio.pause();
                    btn.innerHTML = '<svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
                }
            });
        }
    }

    function showProficiencyOverlay() {
        selectedLevel = null;
        var overlay = document.getElementById('proficiency-overlay');
        var titleEl = document.getElementById('proficiency-item-title');
        titleEl.textContent = playlist[currentIndex].title;

        // Reset selection
        document.querySelectorAll('.proficiency-level-btn').forEach(function(btn) {
            btn.classList.remove('selected');
        });
        overlay.classList.add('active');
    }

    // Hook for viewers: auto-show proficiency at end of content
    window.onStudyContentEnd = function() {
        showProficiencyOverlay();
    };

    function selectProficiency(level) {
        selectedLevel = level;
        document.querySelectorAll('.proficiency-level-btn').forEach(function(btn) {
            btn.classList.toggle('selected', parseInt(btn.dataset.level) === level);
        });
        // Advance immediately after selection
        setTimeout(function() { advanceToNext(); }, 250);
    }

    function advanceToNext() {
        if (selectedLevel === null) return;

        var pk = playlist[currentIndex].pk;
        var title = playlist[currentIndex].title;

        ratings.push({ title: title, level: selectedLevel });

        // POST proficiency update
        var profBody = new URLSearchParams();
        profBody.append('level', selectedLevel);
        fetch('{% url "my_library:update_proficiency" pk=99999 %}'.replace('99999', pk), {
            method: 'POST',
            headers: { 'X-CSRFToken': csrfToken },
            body: profBody,
            credentials: 'same-origin'
        });

        // POST mark as viewed
        fetch('{% url "my_library:mark_viewed" pk=99999 %}'.replace('99999', pk), {
            method: 'POST',
            headers: { 'X-CSRFToken': csrfToken },
            credentials: 'same-origin'
        });

        // Stop any playing audio
        if (flyoutCurrentAudio) { flyoutCurrentAudio.pause(); flyoutCurrentAudio = null; }

        // Hide overlay
        document.getElementById('proficiency-overlay').classList.remove('active');

        // Next item or finish
        loadItem(currentIndex + 1);
    }

    function showSessionComplete() {
        var total = ratings.length;
        var sum = ratings.reduce(function(acc, r) { return acc + r.level; }, 0);
        var avg = total > 0 ? (sum / total).toFixed(1) : 0;

        document.getElementById('summary-total').textContent = total;
        document.getElementById('summary-avg').textContent = avg;

        var starsMap = ['☆☆☆☆', '⭐☆☆☆', '⭐⭐☆☆', '⭐⭐⭐☆', '⭐⭐⭐⭐'];
        var listHtml = ratings.map(function(r) {
            return '<div class="session-item-row">' +
                '<span class="item-name">' + r.title + '</span>' +
                '<span>' + starsMap[r.level] + '</span>' +
                '</div>';
        }).join('');
        document.getElementById('summary-items').innerHTML = listHtml;

        document.getElementById('session-complete').classList.add('active');
        // Hide FAB during session complete
        document.getElementById('study-fab').style.display = 'none';
    }

    // Keyboard: Escape to exit, M to toggle menu
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            var profOverlay = document.getElementById('proficiency-overlay');
            if (profOverlay.classList.contains('active')) {
                profOverlay.classList.remove('active');
            } else if (flyoutOpen) {
                toggleFlyout(false);
            } else {
                window.location.href = '{% url "my_library:index" %}?show_all=1';
            }
        }
        if (e.key === 'm' || e.key === 'M') {
            // Don't toggle if typing in an input
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            toggleFlyout();
        }
    }, true);

    // Start
    if (playlist.length > 0) {
        loadItem(0);
    } else {
        document.getElementById('study-content').innerHTML =
            '<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:12px;">' +
            '<div style="font-size:48px;">📚</div>' +
            '<div>No hay items para estudiar</div>' +
            '<a href="{% url "my_library:index" %}" style="color:#8b5cf6;">Volver a biblioteca</a>' +
            '</div>';
    }
    </script>
</body>
</html>
