<div id="item-tags-{{ item.pk }}" class="flex flex-wrap items-center gap-1 mt-1">
    {% with tags=item.get_content_tags %}
    {% for tag in tags %}
    <span class="badge badge-xs badge-outline">{{ tag.name }}</span>
    {% endfor %}
    {% if is_admin %}
    <button class="tags-edit-btn badge badge-xs badge-ghost cursor-pointer hover:badge-primary"
            onclick="this.style.display='none'; document.getElementById('tags-edit-{{ item.pk }}').style.display='inline-flex';"
            title="Editar tags">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
        </svg>
        tags
    </button>
    <form id="tags-edit-{{ item.pk }}" class="items-center gap-1 w-full mt-1 relative" style="display:none"
          hx-post="{% url 'my_library:update_tags' item.pk %}"
          hx-target="#item-tags-{{ item.pk }}"
          hx-swap="outerHTML">
        {% csrf_token %}
        <div class="relative flex-1">
            <input type="text" name="tags"
                   value="{% for tag in tags %}{{ tag.name }}{% if not forloop.last %}, {% endif %}{% endfor %}"
                   class="input input-xs input-bordered w-full tag-autocomplete-input"
                   placeholder="tag1, tag2, tag3..."
                   autocomplete="off"
                   data-item-id="{{ item.pk }}"
                   oninput="tagAutocomplete(this)"
                   onkeydown="tagAutocompleteKeydown(event, this)">
            <ul class="tag-suggestions absolute left-0 top-full z-50 menu menu-xs bg-base-100 shadow-lg rounded-box w-full max-h-32 overflow-y-auto" style="display:none"></ul>
        </div>
        <button type="submit" class="btn btn-xs btn-success btn-square" title="Guardar">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </button>
        <button type="button" class="btn btn-xs btn-ghost btn-square" title="Cancelar"
                onclick="this.closest('form').style.display='none'; this.closest('[id^=item-tags]').querySelector('.tags-edit-btn').style.display='';">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </form>
    {% endif %}
    {% endwith %}
</div>
