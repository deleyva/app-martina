{# Tag Autocomplete — shared JS for resource tag editing #}
{# Include this partial in any template that uses tag_editor.html #}
<script>
var _resTagDebounce = null;
var _resTagSelectedIdx = -1;

function resTagAutocomplete(input) {
    clearTimeout(_resTagDebounce);
    var sugList = input.parentElement.querySelector('.res-tag-suggestions');
    var val = input.value;
    var parts = val.split(',');
    var currentTag = parts[parts.length - 1].trim();

    if (currentTag.length < 1) {
        sugList.style.display = 'none';
        return;
    }

    _resTagDebounce = setTimeout(function() {
        fetch('{% url "my_library:suggest_tags" %}?q=' + encodeURIComponent(currentTag))
            .then(function(r) { return r.json(); })
            .then(function(tags) {
                _resTagSelectedIdx = -1;
                if (!tags.length) { sugList.style.display = 'none'; return; }
                sugList.innerHTML = tags.map(function(t) {
                    return '<li><a class="res-tag-suggestion text-xs" data-tag="' + t + '" onclick="resSelectTagSuggestion(this)">' + t + '</a></li>';
                }).join('');
                sugList.style.display = '';
            })
            .catch(function() { sugList.style.display = 'none'; });
    }, 200);
}

function resSelectTagSuggestion(el) {
    var tag = el.dataset.tag;
    var form = el.closest('form');
    var input = form.querySelector('input[name=tags]');
    var sugList = el.closest('.res-tag-suggestions');
    var parts = input.value.split(',').map(function(s) { return s.trim(); }).filter(Boolean);
    parts[parts.length - 1] = tag;
    input.value = parts.join(', ') + ', ';
    sugList.style.display = 'none';
    input.focus();
}

function resTagAutocompleteKeydown(e, input) {
    var sugList = input.parentElement.querySelector('.res-tag-suggestions');
    var items = sugList.querySelectorAll('.res-tag-suggestion');
    if (sugList.style.display === 'none' || !items.length) return;

    if (e.key === 'ArrowDown') {
        e.preventDefault();
        _resTagSelectedIdx = Math.min(_resTagSelectedIdx + 1, items.length - 1);
        items.forEach(function(el, i) { el.classList.toggle('active', i === _resTagSelectedIdx); });
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        _resTagSelectedIdx = Math.max(_resTagSelectedIdx - 1, 0);
        items.forEach(function(el, i) { el.classList.toggle('active', i === _resTagSelectedIdx); });
    } else if (e.key === 'Tab' || e.key === 'Enter') {
        if (_resTagSelectedIdx >= 0 && _resTagSelectedIdx < items.length) {
            e.preventDefault();
            resSelectTagSuggestion(items[_resTagSelectedIdx]);
        }
    } else if (e.key === 'Escape') {
        sugList.style.display = 'none';
    }
}

document.addEventListener('click', function(e) {
    if (!e.target.closest('.res-tag-autocomplete-input') && !e.target.closest('.res-tag-suggestions')) {
        document.querySelectorAll('.res-tag-suggestions').forEach(function(s) { s.style.display = 'none'; });
    }
});
</script>
